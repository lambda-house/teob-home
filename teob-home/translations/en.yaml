configuration:
  llm_provider:
    name: LLM provider
    description: Optional AI copilot backend. "none" disables all LLM features.
  openrouter_api_key:
    name: OpenRouter API key
    description: Required when LLM provider is "openrouter".
  openrouter_model:
    name: OpenRouter model
    description: Model identifier used for explanations, digests, and drafting.
  ollama_url:
    name: Ollama URL
    description: Base URL of an Ollama server (e.g. http://192.168.1.50:11434) when LLM provider is "ollama".
  llm_monthly_budget_usd:
    name: LLM monthly budget (USD)
    description: Hard spend cap enforced by the spend guard; LLM calls stop when reached.
  telegram_bot_token:
    name: Telegram bot token
    description: Optional. Enables notifications via a Telegram bot.
  telegram_chat_id:
    name: Telegram chat ID
    description: Chat or group ID the bot sends notifications to.
  signal_retention_days:
    name: Signal retention (days)
    description: How long raw sensor signals are kept in the ring store. Decisions are kept forever.
  shadow_mode:
    name: Shadow mode
    description: When on, heuristics decide and journal but never actuate. Recommended for new installs.
  log_level:
    name: Log level
    description: Verbosity of the add-on log.

name: TEOB Home
version: "0.0.1"
slug: teob_home
description: Event-sourced smart-home brain — programmable heuristics in TypeScript, decision timeline, energy management, optional LLM copilot
url: https://github.com/lambda-house/teob-home
arch:
  - amd64
  - aarch64
image: ghcr.io/lambda-house/{arch}-teob-home
init: false
startup: application
boot: auto
homeassistant_api: true
hassio_api: true
ingress: true
ingress_port: 8099
panel_icon: mdi:home-lightning-bolt
panel_title: TEOB
panel_admin: true
watchdog: http://[HOST]:[PORT:8099]/health
map:
  - type: addon_config
    read_only: false
backup_exclude:
  - "signals.db"
options:
  llm_provider: none
  openrouter_model: anthropic/claude-sonnet-4.5
  llm_monthly_budget_usd: 10
  signal_retention_days: 30
  shadow_mode: true
  log_level: info
schema:
  llm_provider: list(none|openrouter|ollama)
  openrouter_api_key: password?
  openrouter_model: str?
  ollama_url: url?
  llm_monthly_budget_usd: float?
  telegram_bot_token: password?
  telegram_chat_id: str?
  signal_retention_days: int(7,3650)
  shadow_mode: bool
  log_level: list(debug|info|warning|error)

name: Build add-on images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - haarch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - haarch: aarch64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Read add-on version
        id: version
        run: echo "version=$(grep '^version:' teob-home/config.yaml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: teob-home/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/lambda-house/${{ matrix.haarch }}-teob-home:${{ steps.version.outputs.version }}
            ghcr.io/lambda-house/${{ matrix.haarch }}-teob-home:latest
          cache-from: type=gha,scope=${{ matrix.haarch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.haarch }}
